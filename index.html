<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* Header Card */
        .header-card { 
            border: 1px solid #ff0055; 
            margin: 15px; 
            padding: 15px; 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            background: #1a1a1a;
        }

        /* 3D Model Card */
        .content-card { 
            background: #1a1a1a; 
            margin: 15px; 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid #333;
        }

        /* Bottom Fixed Buttons */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #1a1a1a;
            padding: 15px 0;
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #ff0055;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }

        .action-btn {
            background: #ff0055;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <div class="header-card">
        <img src="logo.png" style="width: 50px; border-radius: 50%;">
        <div style="margin-left: 15px;">
            <h3 style="margin:0;">Hey User!</h3>
            <p style="margin:0; font-size: 14px; opacity: 0.8;">Wallet Balance: ₹0.00</p>
        </div>
    </div>

    <!-- 3D Model/Content Area -->
    <div class="content-card">
        <div style="height: 250px; display: flex; justify-content: center; align-items: center; background: #000;">
            <!-- Yahan Spline ya 3D iframe aayega -->
            <p>3D Animation Placeholder</p>
        </div>
        <div style="padding: 15px;">
            <h3>Project Stats</h3>
            <p>Yahan aapka content aur progress dikhega.</p>
        </div>
    </div>

    <!-- Fixed Buttons -->
    <div class="bottom-nav">
        <button class="action-btn" onclick="alert('Watching Ad...')">Watch Ad</button>
        <button class="action-btn" onclick="alert('Withdraw clicked!')">Withdraw</button>
    </div>

</body>
</html>
